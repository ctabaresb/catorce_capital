# ============================================================
# HFT Pipeline — Asset & Feature Configuration
# ============================================================
# Single-asset (BTC_USD on Bitso) pipeline using WebSocket
# order book snapshots + real trade prints from S3.
#
# Book schema:  local_ts, seq, spread, mid, microprice, obi5,
#               bid1_px..bid5_sz, ask1_px..ask5_sz
# Trade schema: local_ts, exchange_ts, trade_id, price,
#               amount, value_usd, side (buy/sell)
# ============================================================

s3:
  bucket: bitso-orderbook
  book_prefix: data/book/          # book_YYYYMMDD_HHMMSS.parquet
  trades_prefix: data/trades/      # trades_YYYYMMDD_HHMMSS.parquet

asset: btc_usd

book:
  n_levels: 5                      # levels per side in raw data
  precomputed:
    - spread
    - mid
    - microprice
    - obi5

# ── Feature build parameters ──────────────────────────────────
feature_build:
  bar_seconds: 60                  # aggregate to 1-minute bars
  trade_rolling_windows_m:         # rolling windows for trade features
    - 1
    - 3
    - 5
    - 10
    - 30
  book_rolling_windows_m:          # rolling windows for book features
    - 1
    - 3
    - 5
    - 10
    - 30
    - 60
    - 120
  mfe_horizons_m:                  # forward horizons for MFE targets
    - 1
    - 2
    - 5
    - 10

# ── Training parameters ──────────────────────────────────────
training:
  walk_forward:
    train_days: 12
    val_days: 2
    step_days: 1
  static_split:
    train_pct: 0.65
    val_pct: 0.15
    test_pct: 0.20
  spread_gate_pctile: 40

# ── Output directories ────────────────────────────────────────
output:
  raw_dir: data/artifacts_raw
  features_dir: data/artifacts_features
  xgb_dir: data/artifacts_xgb
