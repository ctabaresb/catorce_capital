# ============================================================
# Crypto Strategy Lab — Asset & Exchange Configuration
# ============================================================
#
# Structure:
#   exchanges:
#     {exchange_name}:
#       bucket:     S3 bucket name
#       dom_prefix: path prefix inside the bucket
#                   Layout: {dom_prefix}dt=YYYY-MM-DD/data.parquet
#       assets:
#         {book_name}:
#           cross_books: other books on the SAME exchange used for
#                        cross-asset return features
#           has_dom: whether full L2 DOM is available (vs BBO-only)
#
# BBO is always derived from DOM levels (max bid / min ask per snapshot).
# No separate BBO prefix is needed.
# ============================================================
exchanges:
  bitso:
    bucket: bitso-orderbook
    dom_prefix: bitso_dom_parquet/
    assets:
      btc_usd:
        cross_books: [eth_usd, sol_usd]
        has_dom: true
      eth_usd:
        cross_books: [btc_usd, sol_usd]
        has_dom: true
      sol_usd:
        cross_books: [btc_usd, eth_usd]
        has_dom: true
  hyperliquid:
    bucket: hyperliquid-orderbook
    dom_prefix: hyperliquid_dom_parquet/
    indicators_prefix: hyperliquid_metrics_parquet/   # per-minute market indicators (funding, OI, premium, volume)
    book_map:
      btc_usd: BTC
      eth_usd: ETH
      sol_usd: SOL
    assets:
      btc_usd:
        cross_books: [eth_usd]
        has_dom: true
      eth_usd:
        cross_books: [btc_usd]
        has_dom: true
# ============================================================
# Feature build parameters (shared across exchanges)
# ============================================================
feature_build:
  dom:
    k: 10          # top-k levels for full depth features
    k_small: 3     # top-k levels for near-touch features
  windows_days:
    - 180          # primary validation window
    - 60           # recency check
  decision_bars:
    - timeframe: 5m
      bar_minutes: 5
      forward_horizons:
        - label: H60m
          bars: 12       # 12 × 5m = 60m
        - label: H120m
          bars: 24
        - label: H240m
          bars: 48
    - timeframe: 15m
      bar_minutes: 15
      forward_horizons:
        - label: H60m
          bars: 4        # 4 × 15m = 60m
        - label: H120m
          bars: 8
        - label: H240m
          bars: 16
    - timeframe: 30m
      bar_minutes: 30
      forward_horizons:
        - label: H60m
          bars: 2        # 2 × 30m = 60m
        - label: H120m
          bars: 4
        - label: H240m
          bars: 8
# ============================================================
# Output directories
# ============================================================
output:
  raw_dir:      data/artifacts_raw       # download_raw.py + download_market_indicators.py write here
  features_dir: data/artifacts_features  # build_features.py + build_features_hl.py write here
  # Raw naming:        {exchange}_{asset}_{days}d_raw.parquet
  # Indicator naming:  {exchange}_{asset}_{days}d_indicators.parquet
  # Features naming:   features_decision_{timeframe}_{exchange}_{asset}_{days}d.parquet
  # Minute naming:     features_minute_{exchange}_{asset}_{days}d.parquet
