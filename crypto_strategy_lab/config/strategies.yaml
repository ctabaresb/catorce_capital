# =============================================================================
# strategies.yaml
#
# Controls which strategy to test, with which params, across which
# asset/timeframe/window combinations.
#
# To test a different strategy: change `active_strategy` to one of the
# keys listed under `strategies:`.
#
# To test a different scope: change `run_on` (or set to "all").
# =============================================================================

# ---- Which strategy to test right now ----
active_strategy: spread_compression

# ---- Which asset/timeframe/window combos to run ----
# "all" = every combination defined in assets.yaml
# or list specific combos explicitly
run_on:
  - asset: btc_usd
    timeframe: 15m
    window: 180
  - asset: btc_usd
    timeframe: 15m
    window: 60
  - asset: btc_usd
    timeframe: 30m
    window: 180
  - asset: btc_usd
    timeframe: 30m
    window: 60

# ---- Evaluation settings ----
evaluation:
  primary_horizon: H120m        # primary kill/pass horizon
  all_horizons: [H60m, H120m, H240m]

# =============================================================================
# Strategy definitions
# Each strategy has a `module` (import path) and `class` (class name),
# plus a `params` block. Params here override strategy DEFAULT_PARAMS.
#
# Add a new strategy by adding a new key under `strategies:`.
# =============================================================================

strategies:

  # ── Bitso strategies (long-only spot, zero fees) ───────────────────────────
  # All tested on BTC/USD 180d window. All killed or parked.
  # Status as of March 2026: BTC fell 38.5% over test window.
  # Unconditional fwd return H120m = -2.05 bps — hostile for long-only.

  microprice_imbalance_pressure:
    module: strategies.microprice_imbalance_pressure
    class:  MicropriceImbalancePressure
    # STATUS: DEAD — gross -2.2 bps at 15m/180d. Anti-predictive long.
    params:
      top_pct:          0.20
      mpd_weight:       1.0
      wimb_weight:      1.0
      wimb_scale_bps:   10.0
      eps:              1.0e-12
      mpd_min_bps:      0.0
      wimb_min:         0.0
      agree:            false
      spread_max_bps:   null
      min_slope_bps:    0.0

  ichimoku_cloud_breakout:
    module: strategies.ichimoku_cloud_breakout
    class:  IchimokuCloudBreakout
    # STATUS: PARK — gross -0.036 bps at 15m/180d. Least wrong. Retest in bull market.
    params:
      min_cloud_thick_bps:     3.0
      min_slope_bps:           0.0
      top_pct:                 0.30
      breakout_mean_threshold: 0.8

  volatility_reversion:
    module: strategies.volatility_reversion
    class:  VolatilityReversion
    # STATUS: PARK — n=11 at 15m/180d. Signal starvation in bear market.
    params:
      rv_ratio_min:     1.3
      min_bar_ret_bps: -5.0
      vov_ratio_max:    2.5
      top_pct:          0.30
      min_slope_bps:    0.0

  spread_compression:
    module: strategies.spread_compression
    class:  SpreadCompression
    # STATUS: DEAD — gross -6.4 bps at 15m/180d. No directional component.
    params:
      spread_pct_threshold: 0.60
      spread_max_abs_bps:   6.0
      min_tradability:      50.0
      top_pct:              0.30
      min_slope_bps:        0.0

  # cross_asset_divergence: MODULE NOT YET IMPLEMENTED
  # cross_asset_divergence:
  #   module: strategies.cross_asset_divergence
  #   class:  CrossAssetDivergence
  #   params:
  #     min_divergence_bps: 20.0
  #     top_pct:            0.25
  #     min_slope_bps:      0.0

  volume_breakout:
    module: strategies.volume_breakout
    class:  VolumeBreakout
    # STATUS: PARK — gross -1.1 bps, n=72. Needs real volume data or bull market.
    # NOTE: vol_proxy_bar is DOM depth change, not true traded volume.
    params:
      breakout_bars:        20
      min_vol_zscore:       0.5
      require_pocket_pivot: true
      require_adx:          true
      spread_max_bps:       null
      top_pct:              0.30
      min_slope_bps:        0.0

  twap_reversion:
    module: strategies.twap_reversion
    class:  TwapReversion
    # STATUS: PARK — gate redesign needed. Anti-crash filter conflict with bear market.
    # NOTE: TWAP deviation is correlated with dist_ema_120m.
    params:
      twap_window:          "240m"
      min_dev_zscore:       -1.5
      min_tradability:      40.0
      top_pct:              0.30
      min_slope_bps:        -5.0
      max_dist_below_ema:   -0.03
      max_vov_ratio:        3.0

  swing_failure_pattern:
    module: strategies.swing_failure_pattern
    class:  SwingFailurePattern
    # STATUS: PARK — gate redesign needed. 884 raw signals, only 12 survive regime gate.
    # NOTE: sfp_low_flag = bullish (low sweep). sfp_long_flag = bearish — NOT used.
    params:
      min_wick_bps:         2.0
      adx_max:              60.0
      require_adx:          true
      min_tradability:      35.0
      top_pct:              0.30
      min_slope_bps:        -5.0
      max_dist_below_ema:   -0.05
      max_vov_ratio:        3.0

  # ── Hyperliquid strategies (bidirectional perpetuals) ──────────────────────
  # Requires: build_features_hl.py parquets
  # Cost model: spread + 7 bps round-trip taker fee
  # Minimum viable gross: ~16 bps (2× total cost)
  # Test with: python test_strategy.py --exchange hyperliquid --strategy <name>

  funding_rate_contrarian:
    module:    strategies.funding_rate_contrarian
    class:     FundingRateContrarian
    direction: long
    # STATUS: UNTESTED — awaiting HL parquets
    # Hypothesis: extreme negative funding = overcrowded shorts = squeeze setup
    # Carry mechanism: longs receive funding every 8h — reduces net cost of trade
    # Confidence: 55%
    params:
      funding_zscore_thresh:   1.5
      funding_abs_thresh:     -0.0003
      oi_expansion_thresh:     2.0
      min_slope_bps:          -5.0
      max_dist_below_ema:     -0.05
      max_vov_ratio:           3.0
      min_tradability:         35.0
      max_impact_spread_bps:   15.0
      top_pct:                 0.35

  funding_rate_contrarian_short:
    module:    strategies.funding_rate_contrarian
    class:     FundingRateContrarian_Short
    direction: short
    # STATUS: UNTESTED — awaiting HL parquets
    # Hypothesis: extreme positive funding = overcrowded longs = reversal setup
    # Confidence: 50%
    params:
      funding_zscore_thresh:   1.5
      funding_abs_thresh:      0.0003
      oi_expansion_thresh:     2.0
      min_slope_bps:          -10.0
      max_dist_above_ema:      0.05
      max_vov_ratio:           3.0
      min_tradability:         35.0
      max_impact_spread_bps:   15.0
      top_pct:                 0.35

  oi_capitulation:
    module:    strategies.oi_divergence
    class:     OI_Capitulation
    direction: long
    # STATUS: UNTESTED — awaiting HL parquets
    # Hypothesis: forced liquidation exhaustion → price rebounds
    # Confidence: 40%
    params:
      min_oi_decline_4h_pct:  -1.0
      max_ret_bps_bar:        -3.0
      max_oi_decline_1h_pct:  -3.0
      min_slope_bps:          -10.0
      max_dist_below_ema:     -0.08
      max_vov_ratio:           4.0
      min_tradability:         30.0
      max_impact_spread_bps:   20.0
      top_pct:                 0.40

  oi_distribution:
    module:    strategies.oi_divergence
    class:     OI_Distribution
    direction: short
    # STATUS: UNTESTED — awaiting HL parquets
    # Hypothesis: short squeeze exhaustion → price fades
    # Confidence: 40%
    params:
      min_oi_decline_4h_pct:  -0.5
      min_ret_bps_bar:         3.0
      max_funding_8h:          0.0002
      max_slope_bps:           15.0
      max_dist_above_ema:       0.05
      max_vov_ratio:            3.0
      min_tradability:          35.0
      max_impact_spread_bps:   15.0
      top_pct:                  0.35

  mark_oracle_premium_long:
    module:    strategies.mark_oracle_premium
    class:     MarkOraclePremium_Long
    direction: long
    # STATUS: UNTESTED — awaiting HL parquets
    # Hypothesis: mark deeply below oracle → arbitrage pressure pulls it back
    # Confidence: 40%
    params:
      premium_zscore_thresh:    -1.5
      premium_abs_thresh_bps:   -3.0
      require_reverting:         true
      require_funding_alignment: false
      funding_alignment_thresh:  0.0
      min_slope_bps:            -5.0
      max_dist_below_ema:       -0.05
      max_vov_ratio:             3.0
      min_tradability:           35.0
      max_impact_spread_bps:    15.0
      top_pct:                   0.35

  mark_oracle_premium_short:
    module:    strategies.mark_oracle_premium
    class:     MarkOraclePremium_Short
    direction: short
    # STATUS: UNTESTED — awaiting HL parquets
    # Hypothesis: mark above oracle → arbitrage pressure compresses premium
    # Confidence: 38%
    params:
      premium_zscore_thresh:    1.5
      premium_abs_thresh_bps:   3.0
      require_reverting:        true
      require_funding_alignment: false
      funding_alignment_thresh:  0.0
      max_slope_bps:            20.0
      max_dist_above_ema:        0.06
      max_vov_ratio:             3.0
      min_tradability:           35.0
      max_impact_spread_bps:    15.0
      top_pct:                   0.35

  # ── High-frequency HL strategies (designed for 5+ days of data) ───────────
  # These fire more often than the HL perp strategies above.
  # All require build_features_hl.py parquets.

  bb_squeeze_breakout_long:
    module:    strategies.bb_squeeze_breakout
    class:     BB_SqueezeBreakout_Long
    direction: long
    # STATUS: UNTESTED
    # Hypothesis: BB compression resolves upward with non-negative funding
    # Confidence: 45%
    params:
      squeeze_pctile_thresh:  0.40
      expansion_factor:       1.02
      min_bar_ret_bps:        0.0
      max_funding_8h:        -0.0003
      max_vov_ratio:          3.0
      min_slope_bps:         -8.0
      max_dist_below_ema:    -0.07
      min_tradability:        20.0
      max_impact_spread_bps:  25.0
      top_pct:                0.50

  bb_squeeze_breakout_short:
    module:    strategies.bb_squeeze_breakout
    class:     BB_SqueezeBreakout_Short
    direction: short
    # STATUS: UNTESTED
    # Hypothesis: BB compression resolves downward with non-positive funding
    # Confidence: 45%
    params:
      squeeze_pctile_thresh:  0.40
      expansion_factor:       1.02
      max_bar_ret_bps:        0.0
      min_funding_8h:         0.0003
      max_vov_ratio:          3.0
      max_slope_bps:          8.0
      max_dist_above_ema:     0.07
      min_tradability:        20.0
      max_impact_spread_bps:  25.0
      top_pct:                0.50

  dom_absorption_long:
    module:    strategies.dom_absorption
    class:     DOM_AbsorptionLong
    direction: long
    # STATUS: UNTESTED
    # Hypothesis: ask-heavy book + price holding = sell pressure absorbed
    # Confidence: 40%
    params:
      imbalance_thresh:       -0.10
      min_bar_ret_bps:        -5.0
      wimb_min:               -0.20
      max_funding_8h:         -0.0003
      min_slope_bps:          -10.0
      max_dist_below_ema:     -0.08
      max_vov_ratio:           4.0
      min_tradability:         15.0
      max_impact_spread_bps:   30.0
      top_pct:                 0.55

  dom_absorption_short:
    module:    strategies.dom_absorption
    class:     DOM_AbsorptionShort
    direction: short
    # STATUS: UNTESTED
    # Hypothesis: bid-heavy book + price holding = buy pressure absorbed
    # Confidence: 40%
    params:
      imbalance_thresh:        0.10
      max_bar_ret_bps:         5.0
      wimb_max:                0.20
      min_funding_8h:          0.0003
      max_slope_bps:           10.0
      max_dist_above_ema:      0.08
      max_vov_ratio:           4.0
      min_tradability:         15.0
      max_impact_spread_bps:   30.0
      top_pct:                 0.55

  funding_momentum_long:
    module:    strategies.funding_momentum
    class:     Funding_Momentum_Long
    direction: long
    # STATUS: UNTESTED — frequency looks good (~5% of bars on synthetic)
    # Hypothesis: funding trending positive bar-over-bar = short squeeze building
    # NOTE: funding is constant between 8h settlements — comparison is bar-over-bar
    # Confidence: 42%
    params:
      require_rising_intrabar: true
      min_funding_change:      0.000005
      max_funding_zscore:      1.2
      min_bar_ret_bps:        -5.0
      min_vol_zscore:         -0.5
      min_slope_bps:          -6.0
      max_dist_below_ema:     -0.06
      max_vov_ratio:           3.0
      min_tradability:         30.0
      max_impact_spread_bps:   20.0
      top_pct:                 0.40

  funding_momentum_short:
    module:    strategies.funding_momentum
    class:     Funding_Momentum_Short
    direction: short
    # STATUS: UNTESTED — best frequency candidate
    # Hypothesis: funding declining bar-over-bar = long squeeze building
    # NOTE: funding is constant between 8h settlements — comparison is bar-over-bar
    # Confidence: 42%
    params:
      require_falling_intrabar: true
      min_funding_change:       0.000005
      min_funding_zscore:      -1.2
      max_bar_ret_bps:          5.0
      min_vol_zscore:          -0.5
      max_slope_bps:            6.0
      max_dist_above_ema:       0.06
      max_vov_ratio:            3.0
      min_tradability:          30.0
      max_impact_spread_bps:    20.0
      top_pct:                  0.40
