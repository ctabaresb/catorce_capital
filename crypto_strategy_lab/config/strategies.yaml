# =============================================================================
# strategies.yaml
# =============================================================================

active_strategy: oi_distribution

run_on:
  - asset: btc_usd
    timeframe: 15m
    window: 180
  - asset: btc_usd
    timeframe: 15m
    window: 60
  - asset: eth_usd
    timeframe: 15m
    window: 180
  - asset: eth_usd
    timeframe: 15m
    window: 60
  - asset: sol_usd
    timeframe: 15m
    window: 180
  - asset: sol_usd
    timeframe: 15m
    window: 60

evaluation:
  primary_horizon: H120m
  all_horizons: [H60m, H120m, H240m]

strategies:

  # ── Bitso strategies (long-only spot, zero fees) ───────────────────────────
  # All tested on BTC/USD. Root cause of all kills: BTC fell 38.5% over
  # test window. Unconditional H120m = -2.05 bps. Hostile for long-only.

  microprice_imbalance_pressure:
    module: strategies.bitso.microprice_imbalance_pressure
    class:  MicropriceImbalancePressure
    # STATUS: DEAD — gross -2.2 bps at 15m/180d. Anti-predictive long.
    params:
      top_pct:          0.20
      mpd_weight:       1.0
      wimb_weight:      1.0
      wimb_scale_bps:   10.0
      eps:              1.0e-12
      mpd_min_bps:      0.0
      wimb_min:         0.0
      agree:            false
      spread_max_bps:   null
      min_slope_bps:    0.0

  ichimoku_cloud_breakout:
    module: strategies.bitso.ichimoku_cloud_breakout
    class:  IchimokuCloudBreakout
    # STATUS: PARK — gross -0.036 bps at 15m/180d. Least wrong. Retest in bull market.
    params:
      min_cloud_thick_bps:     3.0
      min_slope_bps:           0.0
      top_pct:                 0.30
      breakout_mean_threshold: 0.8

  volatility_reversion:
    module: strategies.bitso.volatility_reversion
    class:  VolatilityReversion
    # STATUS: PARK — n=11 at 15m/180d. Signal starvation in bear market.
    params:
      rv_ratio_min:     1.3
      min_bar_ret_bps: -5.0
      vov_ratio_max:    2.5
      top_pct:          0.30
      min_slope_bps:    0.0

  spread_compression:
    module: strategies.bitso.spread_compression
    class:  SpreadCompression
    # STATUS: DEAD — gross -6.4 bps at 15m/180d. No directional component.
    params:
      spread_pct_threshold: 0.60
      spread_max_abs_bps:   6.0
      min_tradability:      50.0
      top_pct:              0.30
      min_slope_bps:        0.0

  volume_breakout:
    module: strategies.bitso.volume_breakout
    class:  VolumeBreakout
    # STATUS: PARK — gross -1.1 bps, n=72. Needs real volume data or bull market.
    # NOTE: vol_proxy_bar is DOM depth change, not true traded volume.
    params:
      breakout_bars:        20
      min_vol_zscore:       0.5
      require_pocket_pivot: true
      require_adx:          true
      spread_max_bps:       null
      top_pct:              0.30
      min_slope_bps:        0.0

  twap_reversion:
    module: strategies.bitso.twap_reversion
    class:  TwapReversion
    # STATUS: PARK — gate redesign needed. Anti-crash filter vs bear market.
    params:
      twap_window:          "240m"
      min_dev_zscore:       -1.5
      min_tradability:      40.0
      top_pct:              0.30
      min_slope_bps:        -5.0
      max_dist_below_ema:   -0.03
      max_vov_ratio:        3.0

  swing_failure_pattern:
    module: strategies.bitso.swing_failure_pattern
    class:  SwingFailurePattern
    # STATUS: PARK — gate redesign needed. 884 raw signals, 12 survive regime gate.
    params:
      min_wick_bps:         2.0
      adx_max:              60.0
      require_adx:          true
      min_tradability:      35.0
      top_pct:              0.30
      min_slope_bps:        -5.0
      max_dist_below_ema:   -0.05
      max_vov_ratio:        3.0

  # ── Hyperliquid strategies (bidirectional perpetuals) ──────────────────────
  # Exchange: Hyperliquid | Direction: long or short
  # Fee structure (Tier 0, <$5M 14d volume):
  #   Taker: 0.045% per side = 9.0 bps round-trip
  #   Maker: 0.015% per side = 3.0 bps round-trip
  # HL BBO spread (BTC): ~0.14 bps
  # Total cost — Taker: 9.14 bps | Maker: 3.14 bps
  # 2× gross hurdle  — Taker: 18.3 bps | Maker: 6.3 bps
  #
  # Run with:
  #   python test_strategy.py --exchange hyperliquid --strategy <name> --execution maker
  #   python test_strategy.py --exchange hyperliquid --strategy <name> --execution taker

  funding_rate_contrarian:
    module:    strategies.hyperliquid.funding_rate_contrarian
    class:     FundingRateContrarian
    direction: long
    # STATUS: NEEDS MORE DATA — n=19-20 over 20d. Gross ≈ 0 bps over full window.
    # Note: early small-sample result (+10-12 bps gross) was noise, not confirmed.
    # Target: ~March 28 for n≥30.
    params:
      funding_zscore_thresh:   1.5
      funding_abs_thresh:     -0.0003
      oi_expansion_thresh:     2.0
      min_slope_bps:          -5.0
      max_dist_below_ema:     -0.05
      max_vov_ratio:           3.0
      min_tradability:         35.0
      max_impact_spread_bps:   15.0
      top_pct:                 0.35

  funding_rate_contrarian_short:
    module:    strategies.hyperliquid.funding_rate_contrarian
    class:     FundingRateContrarian_Short
    direction: short
    # STATUS: NEEDS MORE DATA — n=21 over 20d.
    params:
      funding_zscore_thresh:   1.5
      funding_abs_thresh:      0.0003
      oi_expansion_thresh:     2.0
      min_slope_bps:          -10.0
      max_dist_above_ema:      0.05
      max_vov_ratio:           3.0
      min_tradability:         35.0
      max_impact_spread_bps:   15.0
      top_pct:                 0.35

  oi_capitulation:
    module:    strategies.hyperliquid.oi_divergence
    class:     OI_Capitulation
    direction: long
    # STATUS: 0 SIGNALS — gate stacking too tight. All conditions rarely coincide.
    params:
      min_oi_decline_4h_pct:  -1.0
      max_ret_bps_bar:        -3.0
      max_oi_decline_1h_pct:  -3.0
      min_slope_bps:          -10.0
      max_dist_below_ema:     -0.08
      max_vov_ratio:           4.0
      min_tradability:         30.0
      max_impact_spread_bps:   20.0
      top_pct:                 0.40

  oi_distribution:
    module:    strategies.hyperliquid.oi_divergence
    class:     OI_Distribution
    direction: short
    # STATUS: MOST PROMISING — H60m maker: gross +12.46 bps, net +9.32 bps, 2/3 segs.
    # H60m is the correct horizon — edge decays by H120m and reverses at H240m.
    # Use: python test_strategy.py --exchange hyperliquid --strategy oi_distribution
    #              --execution maker --horizon H60m
    params:
      min_oi_decline_4h_pct:  -0.5
      min_ret_bps_bar:         3.0
      max_funding_8h:          0.0002
      max_slope_bps:           15.0
      max_dist_above_ema:       0.05
      max_vov_ratio:            3.0
      min_tradability:          35.0
      max_impact_spread_bps:   15.0
      top_pct:                  0.35

  mark_oracle_premium_long:
    module:    strategies.hyperliquid.mark_oracle_premium
    class:     MarkOraclePremium_Long
    direction: long
    # STATUS: WEAK EDGE — gross +2.52 bps, well below 6.28 bps maker hurdle.
    # Premium is negative 99.6% of bars (structural bearish regime).
    # Retest when market regime shifts.
    params:
      premium_zscore_thresh:    -1.5
      premium_abs_thresh_bps:   -3.0
      require_reverting:         true
      require_funding_alignment: false
      funding_alignment_thresh:  0.0
      min_slope_bps:            -5.0
      max_dist_below_ema:       -0.05
      max_vov_ratio:             3.0
      min_tradability:           35.0
      max_impact_spread_bps:    15.0
      top_pct:                   0.35

  mark_oracle_premium_short:
    module:    strategies.hyperliquid.mark_oracle_premium
    class:     MarkOraclePremium_Short
    direction: short
    # STATUS: 0 SIGNALS — premium positive only 0.4% of bars. Regime not present.
    params:
      premium_zscore_thresh:    1.5
      premium_abs_thresh_bps:   3.0
      require_reverting:        true
      require_funding_alignment: false
      funding_alignment_thresh:  0.0
      max_slope_bps:            20.0
      max_dist_above_ema:        0.06
      max_vov_ratio:             3.0
      min_tradability:           35.0
      max_impact_spread_bps:    15.0
      top_pct:                   0.35

  bb_squeeze_breakout_long:
    module:    strategies.hyperliquid.bb_squeeze_breakout
    class:     BB_SqueezeBreakout_Long
    direction: long
    # STATUS: KILLED — gross -11.19 bps at 15m/180d. Dead under all cost models.
    params:
      squeeze_pctile_thresh:  0.40
      expansion_factor:       1.02
      min_bar_ret_bps:        0.0
      max_funding_8h:        -0.0003
      max_vov_ratio:          3.0
      min_slope_bps:         -8.0
      max_dist_below_ema:    -0.07
      min_tradability:        20.0
      max_impact_spread_bps:  25.0
      top_pct:                0.50

  bb_squeeze_breakout_short:
    module:    strategies.hyperliquid.bb_squeeze_breakout
    class:     BB_SqueezeBreakout_Short
    direction: short
    # STATUS: WEAK — gross -5.86 bps. Negative even before fees.
    params:
      squeeze_pctile_thresh:  0.40
      expansion_factor:       1.02
      max_bar_ret_bps:        0.0
      min_funding_8h:         0.0003
      max_vov_ratio:          3.0
      max_slope_bps:          8.0
      max_dist_above_ema:     0.07
      min_tradability:        20.0
      max_impact_spread_bps:  25.0
      top_pct:                0.50

  dom_absorption_long:
    module:    strategies.hyperliquid.dom_absorption
    class:     DOM_AbsorptionLong
    direction: long
    # STATUS: INSUFFICIENT DATA — n=5 over 20d. Gates too tight for current window.
    params:
      imbalance_thresh:       -0.10
      min_bar_ret_bps:        -5.0
      wimb_min:               -0.20
      max_funding_8h:         -0.0003
      min_slope_bps:          -10.0
      max_dist_below_ema:     -0.08
      max_vov_ratio:           4.0
      min_tradability:         15.0
      max_impact_spread_bps:   30.0
      top_pct:                 0.55

  dom_absorption_short:
    module:    strategies.hyperliquid.dom_absorption
    class:     DOM_AbsorptionShort
    direction: short
    # STATUS: INSUFFICIENT DATA — n=3 over 20d.
    params:
      imbalance_thresh:        0.10
      max_bar_ret_bps:         5.0
      wimb_max:                0.20
      min_funding_8h:          0.0003
      max_slope_bps:           10.0
      max_dist_above_ema:      0.08
      max_vov_ratio:           4.0
      min_tradability:         15.0
      max_impact_spread_bps:   30.0
      top_pct:                 0.55

  funding_momentum_long:
    module:    strategies.hyperliquid.funding_momentum
    class:     Funding_Momentum_Long
    direction: long
    # STATUS: KILLED — gross -13.33 bps at 15m. Dead under all cost models.
    # funding momentum direction is not predictive in this regime.
    params:
      require_rising_intrabar: true
      min_funding_change:      0.000005
      max_funding_zscore:      1.2
      min_bar_ret_bps:        -5.0
      min_vol_zscore:         -0.5
      min_slope_bps:          -6.0
      max_dist_below_ema:     -0.06
      max_vov_ratio:           3.0
      min_tradability:         30.0
      max_impact_spread_bps:   20.0
      top_pct:                 0.40

  funding_momentum_short:
    module:    strategies.hyperliquid.funding_momentum
    class:     Funding_Momentum_Short
    direction: short
    # STATUS: KILLED — gross -10.56 bps at 15m. Dead under all cost models.
    params:
      require_falling_intrabar: true
      min_funding_change:       0.000005
      min_funding_zscore:      -1.2
      max_bar_ret_bps:          5.0
      min_vol_zscore:          -0.5
      max_slope_bps:            6.0
      max_dist_above_ema:       0.06
      max_vov_ratio:            3.0
      min_tradability:          30.0
      max_impact_spread_bps:    20.0
      top_pct:                  0.40

  funding_carry_harvest:
    module:    strategies.hyperliquid.funding_carry_harvest
    class:     FundingCarryHarvest
    direction: long
    # STATUS: CONDITIONAL PASS (fragile) — H240m maker: gross +7.24 bps, net +4.10 bps.
    # CAVEAT: T2 segment (Mar 7-10) drove +28 bps; T1 ≈ -11 bps; T3 = +1.8 bps.
    # Not structurally stable — one 3-day rally drove the pass.
    # Carry mechanism is sound but max observed funding (-0.000284) is far below
    # the -0.001 entry threshold; all 55 signals fire via zscore gate only.
    # Actual carry per trade ≈ 0.55 bps (negligible vs 3.14 bps maker cost).
    # Retest required with 60+ days of data before treating as viable.
    # Run: python test_strategy.py --exchange hyperliquid --strategy funding_carry_harvest
    #             --execution maker --horizon H240m
    params:
      min_funding_threshold:   -0.001
      min_consecutive_bars:     4
      min_funding_zscore:      -1.0
      max_oi_collapse_pct:     -3.0
      max_vov_ratio:            3.5
      min_slope_bps:           -8.0
      max_dist_below_ema:      -0.08
      min_tradability:          30.0
      max_impact_spread_bps:    20.0
      top_pct:                  0.50

  # ── Cross-asset variants for A/B testing ──────────────────────────────────
  # Run these after replacing the strategy files to measure whether cross-asset
  # confirmation increases or decreases predictive power.
  # Compare against the baseline (oi_distribution / funding_carry_harvest above).

  oi_distribution_cross_50:
    module:    strategies.hyperliquid.oi_divergence
    class:     OI_Distribution
    direction: short
    # Cross-asset: at least 1 of ETH/SOL must also be rising (50% confirm)
    # Tests whether market-wide squeezes are stronger short setups than single-asset
    params:
      min_oi_decline_4h_pct:    -0.5
      min_ret_bps_bar:           3.0
      max_funding_8h:            0.0002
      max_slope_bps:             15.0
      max_dist_above_ema:         0.05
      max_vov_ratio:              3.0
      min_tradability:            35.0
      max_impact_spread_bps:     15.0
      top_pct:                    0.35
      cross_asset_confirm_pct:    0.5     # at least 1 of ETH/SOL also rising
      min_cross_ret_bps:          2.0
      cross_assets:              ["eth_usd", "sol_usd"]

  oi_distribution_cross_100:
    module:    strategies.hyperliquid.oi_divergence
    class:     OI_Distribution
    direction: short
    # Cross-asset: ALL available cross assets must be rising (100% confirm)
    params:
      min_oi_decline_4h_pct:    -0.5
      min_ret_bps_bar:           3.0
      max_funding_8h:            0.0002
      max_slope_bps:             15.0
      max_dist_above_ema:         0.05
      max_vov_ratio:              3.0
      min_tradability:            35.0
      max_impact_spread_bps:     15.0
      top_pct:                    0.35
      cross_asset_confirm_pct:    1.0     # all of ETH/SOL must also be rising
      min_cross_ret_bps:          2.0
      cross_assets:              ["eth_usd", "sol_usd"]

  funding_carry_cross_50:
    module:    strategies.hyperliquid.funding_carry_harvest
    class:     FundingCarryHarvest
    direction: long
    # Cross-asset: at least 1 of ETH/SOL must show negative return (regime aligned)
    params:
      min_funding_threshold:    -0.001
      min_consecutive_bars:      4
      min_funding_zscore:       -1.0
      max_oi_collapse_pct:      -3.0
      max_vov_ratio:             3.5
      min_slope_bps:            -8.0
      max_dist_below_ema:       -0.08
      min_tradability:           30.0
      max_impact_spread_bps:     20.0
      top_pct:                   0.50
      cross_asset_funding_confirm:  0.5   # at least 1 of ETH/SOL negative return
      cross_assets:                ["eth_usd", "sol_usd"]
